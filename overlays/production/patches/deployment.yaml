apiVersion: apps/v1
kind: Deployment
metadata:
  name: super-proxy
spec:
  replicas: 2
  template:
    spec:
      serviceAccountName: super-proxy-operator
      containers:
        - name: super-proxy
          image: super-proxy-app-image
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: super-proxy-cm